<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Morteza Ghazanfari — Data Analyst</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>

/* ── RESET & BASE ── */
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
html { scroll-behavior: smooth; }
body {
  background: #FAF8F3;
  color: #1C1917;
  font-family: 'DM Sans', sans-serif;
  font-size: 15px;
  line-height: 1.7;
  -webkit-font-smoothing: antialiased;
}
a { text-decoration: none; color: inherit; }
ul { list-style: none; }

/* ── VARIABLES ── */
:root {
  --cream: #FAF8F3;
  --white: #FFFFFF;
  --ink: #1C1917;
  --ink2: #44403C;
  --muted: #78716C;
  --border: #E7E5E0;
  --border2: #D6D3CC;
  --blue: #1D4ED8;
  --blue-soft: #EFF6FF;
  --green: #047857;
  --green-soft: #ECFDF5;
  --serif: 'Cormorant Garamond', Georgia, serif;
  --mono: 'DM Mono', monospace;
  --sans: 'DM Sans', sans-serif;
}

/* ── NAV ── */
nav {
  position: fixed; top: 0; left: 0; right: 0; z-index: 999;
  height: 60px;
  background: rgba(250,248,243,0.95);
  backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 52px;
}
.nav-logo { font-family: var(--serif); font-size: 20px; font-weight: 600; color: var(--ink); }
.nav-logo span { color: var(--blue); }
.nav-links { display: flex; gap: 32px; }
.nav-links a { font-family: var(--mono); font-size: 12px; letter-spacing: 0.05em; color: var(--muted); transition: color 0.2s; }
.nav-links a:hover { color: var(--ink); }
.nav-cta { font-family: var(--mono); font-size: 12px; padding: 8px 20px; background: var(--ink); color: #fff; border-radius: 4px; transition: background 0.2s; }
.nav-cta:hover { background: var(--blue); }

/* ── HERO ── */
.hero { min-height: 100vh; padding: 140px 52px 80px; display: flex; align-items: center; position: relative; overflow: hidden; }
.hero-bg { position: absolute; inset: 0; pointer-events: none;
  background:
    radial-gradient(ellipse 60% 60% at 80% 50%, rgba(29,78,216,0.05) 0%, transparent 70%),
    radial-gradient(ellipse 40% 50% at 5% 80%, rgba(4,120,87,0.03) 0%, transparent 60%);
}
.hero-grid { position: absolute; inset: 0; pointer-events: none; opacity: 0.18;
  background-image:
    linear-gradient(#E7E5E0 1px, transparent 1px),
    linear-gradient(90deg, #E7E5E0 1px, transparent 1px);
  background-size: 64px 64px;
  -webkit-mask-image: radial-gradient(ellipse 80% 80% at 50% 50%, black, transparent);
  mask-image: radial-gradient(ellipse 80% 80% at 50% 50%, black, transparent);
}
.hero-inner { position: relative; z-index: 1; max-width: 700px; }
.badge { display: inline-flex; align-items: center; gap: 8px; font-family: var(--mono); font-size: 11px; padding: 5px 14px; border-radius: 100px; background: var(--green-soft); color: var(--green); border: 1px solid rgba(4,120,87,0.25); margin-bottom: 24px; }
.badge-dot { width: 6px; height: 6px; background: var(--green); border-radius: 50%; }
.hero-label { font-family: var(--mono); font-size: 11px; letter-spacing: 0.14em; color: var(--blue); text-transform: uppercase; display: flex; align-items: center; gap: 12px; margin-bottom: 20px; }
.hero-label::before { content: ''; width: 28px; height: 1px; background: var(--blue); }
.hero h1 { font-family: var(--serif); font-size: clamp(52px, 7vw, 88px); font-weight: 300; line-height: 1.05; letter-spacing: -0.02em; margin-bottom: 8px; color: var(--ink); }
.hero h1 em { font-style: italic; color: var(--muted); }
.hero-role { font-family: var(--serif); font-size: clamp(20px, 2.5vw, 28px); font-weight: 300; color: var(--muted); margin-bottom: 28px; }
.hero-desc { font-size: 15px; font-weight: 300; color: var(--ink2); line-height: 1.85; max-width: 520px; border-left: 2px solid var(--blue); padding-left: 20px; margin-bottom: 20px; }
.hero-location { font-family: var(--mono); font-size: 12px; color: var(--muted); margin-bottom: 36px; }
.hero-btns { display: flex; gap: 12px; flex-wrap: wrap; }
.btn { display: inline-flex; align-items: center; gap: 8px; font-family: var(--mono); font-size: 12px; letter-spacing: 0.05em; padding: 12px 28px; border-radius: 4px; transition: all 0.2s; }
.btn-dark { background: var(--ink); color: #fff; }
.btn-dark:hover { background: var(--blue); transform: translateY(-2px); }
.btn-ghost { border: 1px solid var(--border2); color: var(--ink); }
.btn-ghost:hover { border-color: var(--ink); transform: translateY(-2px); }

.hero-stats { position: absolute; right: 52px; top: 50%; transform: translateY(-50%); display: flex; flex-direction: column; gap: 32px; z-index: 1; }
.stat { text-align: right; }
.stat-n { font-family: var(--serif); font-size: 48px; font-weight: 300; line-height: 1; color: var(--ink); }
.stat-n span { color: var(--blue); }
.stat-l { font-family: var(--mono); font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); }
.stat-line { width: 40px; height: 1px; background: var(--border2); margin-left: auto; margin-top: 4px; }

/* ── SECTION BASE ── */
.section { padding: 100px 52px; border-top: 1px solid var(--border); }
.sec-label { font-family: var(--mono); font-size: 11px; letter-spacing: 0.14em; color: var(--muted); text-transform: uppercase; margin-bottom: 10px; display: flex; align-items: center; gap: 10px; }
.sec-label::after { content: ''; width: 40px; height: 1px; background: var(--border2); }
.sec-title { font-family: var(--serif); font-size: clamp(32px, 4vw, 48px); font-weight: 300; line-height: 1.15; letter-spacing: -0.01em; margin-bottom: 52px; }
.sec-title em { font-style: italic; color: var(--muted); }

/* ── SKILLS ── */
.skills-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 56px; }
.col-title { font-family: var(--mono); font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); margin-bottom: 28px; }
.skill { margin-bottom: 24px; }
.skill-top { display: flex; justify-content: space-between; margin-bottom: 8px; }
.skill-name { font-size: 14px; font-weight: 500; }
.skill-num { font-family: var(--mono); font-size: 12px; color: var(--muted); }
.bar-track { height: 2px; background: var(--border); border-radius: 1px; overflow: hidden; }
.bar-fill { height: 100%; border-radius: 1px; transition: width 1.4s cubic-bezier(0.4, 0, 0.2, 1); }
.bar-fill.b { background: var(--blue); }
.bar-fill.g { background: var(--green); }
.tools-wrap { margin-top: 52px; }
.tools-title { font-family: var(--mono); font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); margin-bottom: 16px; }
.chips { display: flex; flex-wrap: wrap; gap: 8px; }
.chip { font-family: var(--mono); font-size: 12px; padding: 5px 16px; border: 1px solid var(--border2); border-radius: 100px; color: var(--ink2); background: var(--white); transition: all 0.2s; }
.chip:hover { border-color: var(--blue); color: var(--blue); transform: translateY(-1px); }
